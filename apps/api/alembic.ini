# Alembic Configuration File for HyperFactory API
# This file contains the settings used by Alembic migration tool

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with an absolute path
# file_template = %%(abs:filename)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepended_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to python's datetime.datetime.now() function to format
# the timespec format codes, what type of datetime.datetime object is even
# possible is depends on the timestamp_mode setting.
# leave blank for '*' or 'gittish' to use local times in '2027-01-01T17:53:25.746231' format
# or '2027-01-01 17:53:25.746231' format, timestamps generated will be in UTC by default
# unless utcnow is False as also expressed via the timezone ENV setting the utcnow flag also can be set in the "SQLALCHEMY_DATABASE_URL" os.environ variable as well if
# you set the SQLALCHEMY_DATABASE_URL environment variable, the value of that will override the
# sqlalchemy.url setting in this file.
sqlalchemy.url = sqlite:///./test.db

# Logging configuration
[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
